<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Dashboard</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">Production Dashboard</h1>
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Actual Factory Output</h5>
                        <canvas id="outputBarChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Manufacturing Defect Rate (%)</h5>
                        <canvas id="defectLineChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Machine Running Hours</h5>
                        <canvas id="machinePieChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Pairs Produced by Shift</h5>
                        <canvas id="shiftDoughnutChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Energy Draw by Floor Station</h5>
                        <canvas id="powerPolarChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script>
        var ctx1 = document.getElementById('outputBarChart').getContext('2d');
        var outputBarChart = new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: '# of Sales',
                    data: [],
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        var ctx2 = document.getElementById('defectLineChart').getContext('2d');
        var defectLineChart = new Chart(ctx2, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '# of Sales',
                    data: [],
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        var ctx3 = document.getElementById('machinePieChart').getContext('2d');
        var machinePieChart = new Chart(ctx3, {
            type: 'pie',
            data: {
                labels: [],
                datasets: [{
                    label: '# of Sales',
                    data: [],
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        var ctx4 = document.getElementById('shiftDoughnutChart').getContext('2d');
        var shiftDoughnutChart = new Chart(ctx4, {
            type: 'doughnut',
            data: {
                labels: [],
                datasets: [{
                    label: '# of Sales',
                    data: [],
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        var ctx5 = document.getElementById('powerPolarChart').getContext('2d');
        var powerPolarChart = new Chart(ctx5, {
            type: 'polarArea',
            data: {
                labels: [],
                datasets: [{
                    label: '# of Sales',
                    data: [],
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        function fetchDataAndUpdateChart() {
            Papa.parse('production.csv', {
                download: true,
                header: true,
                complete: function (results) {
                    var labels1 = results.data.map(row => row.Month);
                    var data1 = results.data.map(row => row.ActualOutput);
                    outputBarChart.data.labels = labels1;
                    outputBarChart.data.datasets[0].data = data1;
                    outputBarChart.update();

                    var labels2 = results.data.map(row => row.Month);
                    var data2 = results.data.map(row => row.DefectRate);
                    defectLineChart.data.labels = labels2;
                    defectLineChart.data.datasets[0].data = data2;
                    defectLineChart.update();

                    var labels3 = results.data.map(row => row.MachineStatus);
                    var data3 = results.data.map(row => row.RunningHours);
                    machinePieChart.data.labels = labels3;
                    machinePieChart.data.datasets[0].data = data3;
                    machinePieChart.update();

                    var labels4 = results.data.map(row => row.ShiftName);
                    var data4 = results.data.map(row => row.PairsProduced);
                    shiftDoughnutChart.data.labels = labels4;
                    shiftDoughnutChart.data.datasets[0].data = data4;
                    shiftDoughnutChart.update();

                    var labels5 = results.data.map(row => row.FactoryFloor);
                    var data5 = results.data.map(row => row.EnergyConsumption);
                    powerPolarChart.data.labels = labels5;
                    powerPolarChart.data.datasets[0].data = data5;
                    powerPolarChart.update();
                },
                error: function (error) {
                    console.error('Error fetching or parsing data:', error);
                }
            });
        }

        fetchDataAndUpdateChart();
    </script>
</body>

</html>
