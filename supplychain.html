<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply Chain Dashboard</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">Supply Chain Dashboard</h1>
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Raw Materials Inventory Levels</h5>
                        <canvas id="stockBarChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Supplier Lead Time Delays</h5>
                        <canvas id="delayLineChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Freight Logistics Mix</h5>
                        <canvas id="shippingPieChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Warehouse Capacity Utilization</h5>
                        <canvas id="warehouseDoughnutChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Vendor Compliance Ratings</h5>
                        <canvas id="vendorPolarChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script>
        var ctx1 = document.getElementById('stockBarChart').getContext('2d');
        var stockBarChart = new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: '# of Sales',
                    data: [],
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        var ctx2 = document.getElementById('delayLineChart').getContext('2d');
        var delayLineChart = new Chart(ctx2, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '# of Sales',
                    data: [],
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        var ctx3 = document.getElementById('shippingPieChart').getContext('2d');
        var shippingPieChart = new Chart(ctx3, {
            type: 'pie',
            data: {
                labels: [],
                datasets: [{
                    label: '# of Sales',
                    data: [],
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        var ctx4 = document.getElementById('warehouseDoughnutChart').getContext('2d');
        var warehouseDoughnutChart = new Chart(ctx4, {
            type: 'doughnut',
            data: {
                labels: [],
                datasets: [{
                    label: '# of Sales',
                    data: [],
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        var ctx5 = document.getElementById('vendorPolarChart').getContext('2d');
        var vendorPolarChart = new Chart(ctx5, {
            type: 'polarArea',
            data: {
                labels: [],
                datasets: [{
                    label: '# of Sales',
                    data: [],
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        function fetchDataAndUpdateChart() {
            Papa.parse('supplychain.csv', {
                download: true,
                header: true,
                complete: function (results) {
                    var labels1 = results.data.map(row => row.MaterialType);
                    var data1 = results.data.map(row => row.StockLevel);
                    stockBarChart.data.labels = labels1;
                    stockBarChart.data.datasets[0].data = data1;
                    stockBarChart.update();

                    var labels2 = results.data.map(row => row.Month);
                    var data2 = results.data.map(row => row.SupplierDelayDays);
                    delayLineChart.data.labels = labels2;
                    delayLineChart.data.datasets[0].data = data2;
                    delayLineChart.update();

                    var labels3 = results.data.map(row => row.ShippingMethod);
                    var data3 = results.data.map(row => row.ShipmentVolume);
                    shippingPieChart.data.labels = labels3;
                    shippingPieChart.data.datasets[0].data = data3;
                    shippingPieChart.update();

                    var labels4 = results.data.map(row => row.WarehouseRegion);
                    var data4 = results.data.map(row => row.CapacityUtilization);
                    warehouseDoughnutChart.data.labels = labels4;
                    warehouseDoughnutChart.data.datasets[0].data = data4;
                    warehouseDoughnutChart.update();

                    var labels5 = results.data.map(row => row.SupplierName);
                    var data5 = results.data.map(row => row.ComplianceScore);
                    vendorPolarChart.data.labels = labels5;
                    vendorPolarChart.data.datasets[0].data = data5;
                    vendorPolarChart.update();
                },
                error: function (error) {
                    console.error('Error fetching or parsing data:', error);
                }
            });
        }

        fetchDataAndUpdateChart();
    </script>
</body>

</html>
